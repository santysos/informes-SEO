<!-- Estilos custom (glassmorphism + reset Elementor) -->
<style>
:root {
    --ch-glass-bg:          rgba(255, 255, 255, 0.12);
    --ch-glass-bg-strong:   rgba(255, 255, 255, 0.22);
    --ch-glass-border:      rgba(255, 255, 255, 0.28);
    --ch-glass-shadow:      0 8px 32px 0 rgba(0, 75, 112, 0.18);
}
.ch-glass {
    background: var(--ch-glass-bg);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid var(--ch-glass-border);
    box-shadow: var(--ch-glass-shadow);
}
.ch-glass-strong {
    background: var(--ch-glass-bg-strong);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--ch-glass-border);
    box-shadow: var(--ch-glass-shadow);
}
.ch-glass-light {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 6px 24px rgba(0, 98, 143, 0.08);
}
.ch-hero-gradient {
    background: linear-gradient(180deg, rgba(26, 27, 31, 0.45) 0%, rgba(26, 27, 31, 0.1) 40%, rgba(26, 27, 31, 0.85) 100%);
}
.ch-cta-gradient {
    background:
        radial-gradient(ellipse at 30% 20%, rgba(0, 124, 180, 0.55) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(140, 205, 255, 0.35) 0%, transparent 55%),
        #0a1b2e;
}
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
}
.ch-home-wrapper { font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1b1f; }
.ch-home-wrapper h1, .ch-home-wrapper h2, .ch-home-wrapper h3 { font-family: 'Montserrat', sans-serif; letter-spacing: -0.02em; }

/* FAQ acordeón */
.ch-home-wrapper details[open] summary .ch-faq-icon { transform: rotate(180deg); }
.ch-home-wrapper .ch-faq-icon { transition: transform 0.3s ease; }
.ch-home-wrapper summary { list-style: none; cursor: pointer; }
.ch-home-wrapper summary::-webkit-details-marker { display: none; }

/* Reset de wrappers de Elementor para esta home */
.page-template-elementor_canvas .ch-home-wrapper,
.elementor-page .ch-home-wrapper {
    margin: 0;
    padding: 0;
}
.elementor-section.ch-home-section {
    padding: 0 !important;
}
.elementor-section.ch-home-section > .elementor-container {
    padding: 0 !important;
    max-width: 100% !important;
}
</style>
